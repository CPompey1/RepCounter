[env:nanorp2040connect]
platform = raspberrypi
board = nanorp2040connect
framework = arduino
platform_packages = platformio/tool-openocd-raspberrypi@^2.1100.0
lib_deps = 
	arduino-libraries/Arduino_LSM6DSOX@^1.1.2
	khoih-prog/RP2040_SD@^1.0.1
	khoih-prog/LittleFS_Mbed_RP2040@^1.1.0
	khoih-prog/TimerInterrupt@^1.8.0
	ivanseidel/Thread@0.0.0-alpha+sha.1a4e504c5f
